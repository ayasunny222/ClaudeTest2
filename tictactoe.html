<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e0e0ff;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.6rem;
      color: #a0a0ff;
      font-weight: 600;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
      border: 2px solid #0f3460;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #ff6b6b; }
    .cell.o { color: #4ecdc4; }

    .cell.win {
      background: #0f3460;
      border-color: #a0a0ff;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #controls {
      margin-top: 1.8rem;
      display: flex;
      gap: 12px;
    }

    button {
      padding: 0.6rem 1.4rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover { opacity: 0.85; transform: scale(1.03); }

    #restartBtn {
      background: #a0a0ff;
      color: #1a1a2e;
    }

    #modeBtn {
      background: #0f3460;
      color: #eee;
      border: 2px solid #a0a0ff;
    }

    #score {
      margin-top: 1.5rem;
      display: flex;
      gap: 2rem;
      font-size: 1rem;
      color: #888;
    }

    #score span { font-weight: 700; }
    #score .x-score { color: #ff6b6b; }
    #score .o-score { color: #4ecdc4; }
    #score .tie-score { color: #aaa; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">X's turn</div>
  <div id="board"></div>
  <div id="controls">
    <button id="restartBtn">Restart</button>
    <button id="modeBtn">vs Computer</button>
  </div>
  <div id="score">
    <div>X: <span class="x-score" id="xScore">0</span></div>
    <div>Ties: <span class="tie-score" id="tieScore">0</span></div>
    <div>O: <span class="o-score" id="oScore">0</span></div>
  </div>

  <script>
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const restartBtn = document.getElementById('restartBtn');
    const modeBtn = document.getElementById('modeBtn');
    const xScoreEl = document.getElementById('xScore');
    const oScoreEl = document.getElementById('oScore');
    const tieScoreEl = document.getElementById('tieScore');

    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, vsComputer, scores;

    function init() {
      board = Array(9).fill('');
      current = 'X';
      gameOver = false;
      scores = scores || { X: 0, O: 0, T: 0 };
      render();
      updateStatus();
    }

    function render() {
      boardEl.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (val ? ' taken ' + val.toLowerCase() : '');
        cell.textContent = val;
        cell.addEventListener('click', () => handleClick(i));
        boardEl.appendChild(cell);
      });
    }

    function handleClick(i) {
      if (gameOver || board[i]) return;
      board[i] = current;
      render();
      const result = checkResult();
      if (!result) {
        current = current === 'X' ? 'O' : 'X';
        updateStatus();
        if (vsComputer && current === 'O' && !gameOver) {
          setTimeout(computerMove, 300);
        }
      }
    }

    function checkResult() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          gameOver = true;
          scores[board[a]]++;
          updateScores();
          statusEl.textContent = `${board[a]} wins!`;
          [a, b, c].forEach(i => boardEl.children[i].classList.add('win'));
          return true;
        }
      }
      if (board.every(c => c)) {
        gameOver = true;
        scores.T++;
        updateScores();
        statusEl.textContent = "It's a tie!";
        return true;
      }
      return false;
    }

    function updateStatus() {
      if (!gameOver) statusEl.textContent = `${current}'s turn`;
    }

    function updateScores() {
      xScoreEl.textContent = scores.X;
      oScoreEl.textContent = scores.O;
      tieScoreEl.textContent = scores.T;
    }

    // Minimax AI
    function computerMove() {
      const best = minimax(board, 'O');
      handleClick(best.index);
    }

    function minimax(b, player, depth = 0) {
      for (const [a, x, c] of WINS) {
        if (b[a] && b[a] === b[x] && b[a] === b[c]) {
          return { score: b[a] === 'O' ? 10 - depth : depth - 10 };
        }
      }
      if (b.every(c => c)) return { score: 0 };

      const moves = [];
      b.forEach((val, i) => {
        if (!val) {
          const nb = [...b];
          nb[i] = player;
          const result = minimax(nb, player === 'O' ? 'X' : 'O', depth + 1);
          moves.push({ index: i, score: result.score });
        }
      });

      const best = moves.reduce((a, m) =>
        player === 'O' ? (m.score > a.score ? m : a) : (m.score < a.score ? m : a)
      );
      return best;
    }

    restartBtn.addEventListener('click', () => { scores = scores || { X: 0, O: 0, T: 0 }; init(); });

    modeBtn.addEventListener('click', () => {
      vsComputer = !vsComputer;
      modeBtn.textContent = vsComputer ? 'vs Human' : 'vs Computer';
      scores = { X: 0, O: 0, T: 0 };
      updateScores();
      init();
    });

    scores = { X: 0, O: 0, T: 0 };
    init();
  </script>
</body>
</html>
